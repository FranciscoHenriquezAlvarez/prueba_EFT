name: Deploy EFT Semana 09

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BFF_IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/cursos-bff-service
  BFF_IMAGE_LATEST: ${{ secrets.DOCKERHUB_USERNAME }}/cursos-bff-service:latest
  BFF_IMAGE_SHA: ${{ secrets.DOCKERHUB_USERNAME }}/cursos-bff-service:${{ github.sha }}
  CONSUMER_IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/eventos-academicos-consumidor-service
  CONSUMER_IMAGE_LATEST: ${{ secrets.DOCKERHUB_USERNAME }}/eventos-academicos-consumidor-service:latest
  CONSUMER_IMAGE_SHA: ${{ secrets.DOCKERHUB_USERNAME }}/eventos-academicos-consumidor-service:${{ github.sha }}
  DEPLOY_PATH: /home/ec2-user/cloudnativeapp_EFT

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Dar permisos al wrapper
        run: chmod +x mvnw

      - name: Ejecutar build y pruebas
        run: ./mvnw clean test package

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen BFF
        run: docker build -f ms-cursos-bff/Dockerfile -t $BFF_IMAGE_LATEST -t $BFF_IMAGE_SHA ms-cursos-bff

      - name: Construir imagen consumidor
        run: docker build -f ms-eventos-academicos-consumidor/Dockerfile -t $CONSUMER_IMAGE_LATEST -t $CONSUMER_IMAGE_SHA ms-eventos-academicos-consumidor

      - name: Publicar imagen BFF
        run: |
          docker push $BFF_IMAGE_LATEST
          docker push $BFF_IMAGE_SHA

      - name: Publicar imagen consumidor
        run: |
          docker push $CONSUMER_IMAGE_LATEST
          docker push $CONSUMER_IMAGE_SHA

      - name: Desplegar en EC2 por SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH"

            if ! mountpoint -q /mnt/efs; then
              echo "ERROR: EFS no esta montado en /mnt/efs"
              exit 1
            fi

            sudo mkdir -p /mnt/efs/resumenes /mnt/efs/contenidos
            sudo chown -R ec2-user:ec2-user /mnt/efs/resumenes /mnt/efs/contenidos

            cd "$DEPLOY_PATH"

            cat > docker-compose.ec2.yml <<'EOF'
            services:
              rabbitmq:
                image: rabbitmq:3-management
                container_name: rabbitmq
                restart: unless-stopped
                ports:
                  - "5672:5672"
                  - "15672:15672"
                environment:
                  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
                  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
                volumes:
                  - rabbitmq-data:/var/lib/rabbitmq
                networks:
                  - cloudnative-net

              ms-cursos-bff:
                image: ${CURSOS_BFF_IMAGE}
                container_name: ms-cursos-bff
                restart: unless-stopped
                depends_on:
                  - rabbitmq
                ports:
                  - "8080:8080"
                environment:
                  SERVER_PORT: 8080
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  ORACLE_WALLET_PATH: /app/wallet
                  JWT_ISSUER_URI: ${JWT_ISSUER_URI}
                  JWT_AUDIENCE: ${JWT_AUDIENCE}
                  RABBITMQ_HOST: rabbitmq
                  RABBITMQ_PORT: 5672
                  RABBITMQ_USER: ${RABBITMQ_USER:-guest}
                  RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
                  AWS_REGION: ${AWS_REGION}
                  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
                  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
                  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
                  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
                  JWT_JWK_SET_URI: ${JWT_JWK_SET_URI}
                  RESUMENES_PATH: ${RESUMENES_PATH:-/app/efs/resumenes}
                  CONTENIDOS_EFS_PATH: ${CONTENIDOS_EFS_PATH:-/app/efs/contenidos}
                  EVENTOS_CONSUMIDOR_URL: ${EVENTOS_CONSUMIDOR_URL:-http://ms-eventos-academicos-consumidor:8081}
                volumes:
                  - /mnt/efs:/app/efs
                  - /home/ec2-user/wallets/Wallet_cloudnativeapp:/app/wallet:ro
                networks:
                  - cloudnative-net

              ms-eventos-academicos-consumidor:
                image: ${EVENTOS_ACADEMICOS_CONSUMIDOR_IMAGE}
                container_name: ms-eventos-academicos-consumidor
                restart: unless-stopped
                depends_on:
                  - rabbitmq
                ports:
                  - "8081:8081"
                environment:
                  SERVER_PORT: 8081
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  ORACLE_WALLET_PATH: /app/wallet
                  JWT_ISSUER_URI: ${JWT_ISSUER_URI}
                  JWT_AUDIENCE: ${JWT_AUDIENCE}
                  JWT_JWK_SET_URI: ${JWT_JWK_SET_URI}
                  RABBITMQ_HOST: rabbitmq
                  RABBITMQ_PORT: 5672
                  RABBITMQ_USER: ${RABBITMQ_USER:-guest}
                  RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
                volumes:
                  - /home/ec2-user/wallets/Wallet_cloudnativeapp:/app/wallet:ro
                networks:
                  - cloudnative-net

            networks:
              cloudnative-net:
                name: cloudnative-net

            volumes:
              rabbitmq-data:
            EOF

            cat > .env <<'EOF'
            CURSOS_BFF_IMAGE=${{ env.BFF_IMAGE_LATEST }}
            EVENTOS_ACADEMICOS_CONSUMIDOR_IMAGE=${{ env.CONSUMER_IMAGE_LATEST }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}
            RESUMENES_PATH=/app/efs/resumenes
            CONTENIDOS_EFS_PATH=/app/efs/contenidos
            EVENTOS_CONSUMIDOR_URL=http://ms-eventos-academicos-consumidor:8081
            JWT_ISSUER_URI=${{ secrets.JWT_ISSUER_URI }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            JWT_JWK_SET_URI=${{ secrets.JWT_JWK_SET_URI }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin >/dev/null 2>&1
            docker compose -f docker-compose.ec2.yml pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans
            docker compose -f docker-compose.ec2.yml ps
            echo "Esperando inicio de los microservicios..."
            sleep 30

            echo "Validando health del BFF..."
            if ! curl --fail --retry 10 --retry-delay 5 \
              http://localhost:8080/api/health; then
              echo "ERROR: ms-cursos-bff no responde"
              docker compose -f docker-compose.ec2.yml logs \
                --tail=100 ms-cursos-bff
              exit 1
            fi

            echo "Validando health del consumidor..."
            if ! curl --fail --retry 10 --retry-delay 5 \
              http://localhost:8081/api/health; then
              echo "ERROR: ms-eventos-academicos-consumidor no responde"
              docker compose -f docker-compose.ec2.yml logs \
                --tail=100 ms-eventos-academicos-consumidor
              exit 1
            fi

            echo "Despliegue EFT validado correctamente"
