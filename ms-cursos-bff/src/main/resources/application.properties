spring.application.name=ms-cursos-bff

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.data-source-properties.oracle.net.tns_admin=${ORACLE_WALLET_PATH:/app/wallet}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.audiences=${JWT_AUDIENCE}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:}

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:${RABBITMQ_USERNAME:guest}}
spring.rabbitmq.password=${RABBITMQ_PASS:${RABBITMQ_PASSWORD:guest}}

aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}

app.archivos.resumenes-path=${RESUMENES_PATH:/app/efs/resumenes}
app.archivos.contenidos-efs-path=${CONTENIDOS_EFS_PATH:/app/efs/contenidos}
app.eventos.consumidor-url=${EVENTOS_CONSUMIDOR_URL:http://localhost:8081}
app.rabbitmq.queue=eventos-academicos-queue
app.rabbitmq.error-queue=eventos-academicos-error-queue
app.rabbitmq.exchange=eventos-academicos-exchange
app.rabbitmq.routing-key=evento.academico
app.rabbitmq.error-routing-key=evento.academico.error

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
