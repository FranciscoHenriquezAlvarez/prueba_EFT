spring.datasource.url=jdbc:h2:mem:cursos_bff;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost/issuer
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/jwks
spring.security.oauth2.resourceserver.jwt.audiences=test-audience

spring.rabbitmq.dynamic=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

management.health.rabbit.enabled=false

aws.region=us-east-1
aws.s3.bucket-name=test-bucket
aws.access-key=test
aws.secret-key=test
aws.session-token=test

app.archivos.resumenes-path=${java.io.tmpdir}/cursos-bff-test/resumenes
app.archivos.contenidos-efs-path=${java.io.tmpdir}/cursos-bff-test/contenidos
app.eventos.consumidor-url=http://localhost:8081
app.rabbitmq.queue=eventos-academicos-queue
app.rabbitmq.error-queue=eventos-academicos-error-queue
app.rabbitmq.exchange=eventos-academicos-exchange
app.rabbitmq.routing-key=evento.academico
app.rabbitmq.error-routing-key=evento.academico.error
